<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TorqueShed Shop</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root {
    --bg: #0D0F12;
    --surface: #15181D;
    --surface-2: #1B1F25;
    --border: #2A2F38;
    --text: #F4F5F7;
    --muted: #9AA1AC;
    --orange: #FF6B35;
    --yellow: #F59E0B;
    --green: #10B981;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  a { color: var(--orange); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: rgba(13,15,18,0.85); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 5;
  }
  .brand { font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; font-size: 14px; color: var(--text); }
  .brand span { color: var(--orange); }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }
  .hero {
    margin-top: 24px; padding: 28px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
  }
  .logo {
    width: 88px; height: 88px; border-radius: 16px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    color: var(--orange); font-weight: 800; font-size: 28px;
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  h1 { margin: 0 0 6px; font-family: "Montserrat", sans-serif; font-size: 28px; letter-spacing: -0.01em; }
  .meta { color: var(--muted); font-size: 14px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .badge {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
  }
  .badge.verified { color: var(--green); border-color: rgba(16,185,129,0.4); }
  .badge.years { color: var(--orange); border-color: rgba(255,107,53,0.4); }
  .grid { display: grid; gap: 20px; margin-top: 24px; grid-template-columns: 1fr; }
  @media (min-width: 760px) { .grid { grid-template-columns: 1.4fr 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px;
  }
  .card h2 { margin: 0 0 14px; font-size: 17px; font-family: "Montserrat", sans-serif; letter-spacing: 0.02em; text-transform: uppercase; color: var(--text); }
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 14px; }
  .stat { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; color: var(--orange); }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  p.desc { margin: 0; color: var(--text); white-space: pre-wrap; }
  ul.list { margin: 0; padding: 0; list-style: none; }
  ul.list li { padding: 12px 0; border-bottom: 1px solid var(--border); }
  ul.list li:last-child { border-bottom: 0; }
  .svc-name { font-weight: 700; }
  .svc-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .svc-row { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .svc-price { color: var(--orange); font-weight: 700; font-size: 14px; white-space: nowrap; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip { padding: 4px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--muted); }
  .contact-row { display: flex; gap: 8px; align-items: center; padding: 10px 0; color: var(--text); font-size: 14px; border-bottom: 1px solid var(--border); }
  .contact-row:last-of-type { border-bottom: 0; }
  .contact-row b { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; min-width: 70px; }
  form input, form textarea, form select {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px;
    font-family: inherit; margin-bottom: 10px;
  }
  form textarea { min-height: 100px; resize: vertical; }
  form label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  form button {
    width: 100%; padding: 12px; border-radius: 999px; border: 0;
    background: var(--orange); color: #0D0F12; font-weight: 700; cursor: pointer;
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  form button:disabled { opacity: 0.5; cursor: not-allowed; }
  .ok { color: var(--green); padding: 12px; background: rgba(16,185,129,0.1); border-radius: 8px; margin-bottom: 10px; }
  .err { color: #F87171; padding: 12px; background: rgba(248,113,113,0.1); border-radius: 8px; margin-bottom: 10px; }
  .empty { color: var(--muted); padding: 28px; text-align: center; }
  .footer { margin-top: 32px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Torque<span>Shed</span></div>
    <div class="pill">Shop Profile</div>
  </div>
  <div class="wrap" id="root">
    <div class="empty">Loading…</div>
  </div>
<script>
(function(){
  var slug = window.location.pathname.split('/').filter(Boolean).pop();
  var root = document.getElementById('root');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[c];
    });
  }
  function safeUrl(u) {
    if (u == null) return '';
    var s = String(u).trim();
    if (!s) return '';
    if (/^(https?:|mailto:|tel:)/i.test(s)) return esc(s);
    if (/^\/[^\/]/.test(s)) return esc(s);
    return '';
  }

  function fetchShop() {
    fetch('/api/public/shops/' + encodeURIComponent(slug))
      .then(function(r){ if (!r.ok) throw new Error('Shop not found'); return r.json(); })
      .then(render)
      .catch(function(){ root.innerHTML = '<div class="empty">This shop is not available.</div>'; });
  }

  function renderHours(hours) {
    var days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    var rows = days.filter(function(d){ return hours && hours[d]; }).map(function(d){
      return '<div class="contact-row"><b>' + d.slice(0,3).toUpperCase() + '</b><span>' + esc(hours[d]) + '</span></div>';
    });
    return rows.length ? rows.join('') : '<div class="empty" style="padding:8px 0;">Hours not posted.</div>';
  }

  function render(data) {
    var s = data.shop;
    var c = data.credibility || {};
    var initials = (s.displayName || '?').split(' ').slice(0,2).map(function(w){return w.charAt(0).toUpperCase();}).join('');
    var logoSrc = safeUrl(s.logoUrl);
    var logo = logoSrc ? '<img src="'+logoSrc+'" alt="Shop logo">' : esc(initials);

    var badges = '';
    if (s.isVerified) badges += '<span class="badge verified">Verified</span>';
    if (s.yearsInBusiness) badges += '<span class="badge years">' + esc(s.yearsInBusiness) + '+ years</span>';
    if (s.serviceArea) badges += '<span class="badge">' + esc(s.serviceArea) + '</span>';

    var specialties = (s.specialties || []).map(function(x){ return '<span class="chip">' + esc(x) + '</span>'; }).join('');
    var certs = (s.certifications || []).map(function(x){ return '<span class="chip">' + esc(x) + '</span>'; }).join('');

    var services = (data.services || []).map(function(svc){
      return '<li>' +
        '<div class="svc-row">' +
          '<div><div class="svc-name">' + esc(svc.name) + '</div>' +
          (svc.description ? '<div class="svc-meta">' + esc(svc.description) + '</div>' : '') +
          (svc.eta ? '<div class="svc-meta">ETA: ' + esc(svc.eta) + '</div>' : '') +
          '</div>' +
          (svc.startingPrice ? '<div class="svc-price">' + esc(svc.startingPrice) + '</div>' : '') +
        '</div>' +
      '</li>';
    }).join('');

    var contact = '';
    if (s.phone)   contact += '<div class="contact-row"><b>Phone</b><span>' + esc(s.phone) + '</span></div>';
    if (s.email)   contact += '<div class="contact-row"><b>Email</b><a href="mailto:' + esc(s.email) + '">' + esc(s.email) + '</a></div>';
    var webHref = safeUrl(s.website);
    if (webHref) contact += '<div class="contact-row"><b>Web</b><a href="' + webHref + '" target="_blank" rel="noopener">' + esc(s.website) + '</a></div>';
    if (s.address) contact += '<div class="contact-row"><b>Addr</b><span>' + esc(s.address) + '</span></div>';

    var serviceOptions = '<option value="">General inquiry</option>' + (data.services || []).map(function(svc){
      return '<option value="' + esc(svc.id) + '">' + esc(svc.name) + '</option>';
    }).join('');

    root.innerHTML =
      '<div class="hero">' +
        '<div class="logo">' + logo + '</div>' +
        '<div style="flex:1;min-width:240px;">' +
          '<h1>' + esc(s.displayName) + '</h1>' +
          (s.location ? '<div class="meta">' + esc(s.location) + '</div>' : '') +
          (badges ? '<div class="badges">' + badges + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="grid">' +
        '<div>' +
          '<div class="card">' +
            '<div class="stat-row">' +
              '<div class="stat"><div class="stat-num">' + (c.solvedCases || 0) + '</div><div class="stat-lbl">Solved Cases</div></div>' +
              '<div class="stat"><div class="stat-num">' + (c.services || 0) + '</div><div class="stat-lbl">Services</div></div>' +
              '<div class="stat"><div class="stat-num">' + (c.activeListings || 0) + '</div><div class="stat-lbl">Listings</div></div>' +
            '</div>' +
            (s.description ? '<p class="desc">' + esc(s.description) + '</p>' : '<p class="desc" style="color:var(--muted)">No description yet.</p>') +
            (specialties ? '<h2 style="margin-top:18px;">Specialties</h2><div class="chips">' + specialties + '</div>' : '') +
            (certs ? '<h2 style="margin-top:18px;">Certifications</h2><div class="chips">' + certs + '</div>' : '') +
          '</div>' +
          '<div class="card" style="margin-top:20px;">' +
            '<h2>Services</h2>' +
            (services ? '<ul class="list">' + services + '</ul>' : '<div class="empty">No services posted yet.</div>') +
          '</div>' +
        '</div>' +
        '<div>' +
          '<div class="card">' +
            '<h2>Contact</h2>' +
            (contact || '<div class="empty">Use the form below.</div>') +
            '<h2 style="margin-top:18px;">Hours</h2>' +
            renderHours(s.hours) +
          '</div>' +
          '<div class="card" style="margin-top:20px;">' +
            '<h2>Request a Quote</h2>' +
            '<div id="lead-status"></div>' +
            '<form id="lead-form">' +
              '<label>Your name</label>' +
              '<input name="customerName" required maxlength="200" />' +
              '<label>Email</label>' +
              '<input name="email" type="email" maxlength="200" />' +
              '<label>Phone</label>' +
              '<input name="phone" maxlength="30" />' +
              '<label>Vehicle</label>' +
              '<input name="vehicle" placeholder="Year / Make / Model" maxlength="200" />' +
              '<label>Service</label>' +
              '<select name="serviceId">' + serviceOptions + '</select>' +
              '<label>Issue / Request</label>' +
              '<textarea name="issue" required minlength="5" maxlength="4000"></textarea>' +
              '<label>Preferred contact</label>' +
              '<select name="preferredContact"><option value="email">Email</option><option value="phone">Phone</option><option value="text">Text</option></select>' +
              '<button type="submit">Send Request</button>' +
            '</form>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="footer">Powered by TorqueShed</div>';

    var form = document.getElementById('lead-form');
    var status = document.getElementById('lead-status');
    form.addEventListener('submit', function(e){
      e.preventDefault();
      var fd = new FormData(form);
      var payload = {};
      fd.forEach(function(v,k){ if (v !== '') payload[k] = v; });
      if (!payload.serviceId) delete payload.serviceId;
      var btn = form.querySelector('button');
      btn.disabled = true;
      status.innerHTML = '';
      fetch('/api/public/shops/' + encodeURIComponent(slug) + '/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).then(function(r){
        return r.json().then(function(j){ return { ok: r.ok, body: j }; });
      }).then(function(res){
        if (res.ok) {
          form.reset();
          status.innerHTML = '<div class="ok">Thanks. The shop has been notified and will reach out.</div>';
        } else {
          status.innerHTML = '<div class="err">' + esc(res.body.error || 'Failed to submit.') + '</div>';
        }
      }).catch(function(){
        status.innerHTML = '<div class="err">Network error. Please try again.</div>';
      }).finally(function(){ btn.disabled = false; });
    });
  }

  fetchShop();
})();
</script>
</body>
</html>
